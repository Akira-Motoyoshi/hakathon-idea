<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Messi Career Atlas</title>
    <meta
      name="description"
      content="A lightweight 3D story map tracing Lionel Messi's football route from Rosario to the FIFA World Cup 26 final venue."
    >
    <link rel="preconnect" href="https://unpkg.com">
    <link rel="preconnect" href="https://tiles.openfreemap.org">
    <link href="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.css" rel="stylesheet">
    <link href="./style.css" rel="stylesheet">
  </head>
  <body>
    <main class="story-shell" aria-label="Messi career story map">
      <div id="map" aria-hidden="true"></div>
      <div class="map-shade" aria-hidden="true"></div>

      <header class="hero-label">
        <p class="eyebrow">Messi Career Atlas</p>
        <h1>Messi World Route</h1>
      </header>

      <aside class="scene-panel" aria-live="polite">
        <div class="panel-topline">
          <span id="scene-year" class="scene-year">1987</span>
          <span id="scene-counter">01 / 13</span>
        </div>
        <h2 id="scene-title">Rosario</h2>
        <p id="scene-place" class="scene-place">Rosario, Argentina</p>
        <div class="scene-visuals">
          <figure class="scene-photo">
            <img id="scene-photo" alt="" decoding="async" referrerpolicy="no-referrer">
            <figcaption id="photo-credit"></figcaption>
          </figure>
          <div id="kit-card" class="kit-card" hidden>
            <div id="kit-shirt" class="kit-shirt" aria-hidden="true"></div>
            <span id="kit-label"></span>
          </div>
        </div>
        <div class="scene-meta">
          <span id="scene-distance">0 km route</span>
          <span id="scene-coordinates">-32.9468, -60.6393</span>
        </div>
        <div class="panel-actions">
          <button id="copy-coordinates" type="button">Copy coords</button>
          <button id="overview" type="button">Route</button>
        </div>
      </aside>

      <nav id="scene-dock" class="scene-dock" aria-label="Scene selector"></nav>

      <section class="control-strip" aria-label="Story controls">
        <button id="previous" type="button" aria-label="Previous scene">Prev</button>
        <button id="play-toggle" class="primary" type="button" aria-label="Pause autoplay">Pause</button>
        <button id="next" type="button" aria-label="Next scene">Next</button>
      </section>

      <div class="timeline" aria-hidden="true">
        <div id="timeline-progress" class="timeline-progress"></div>
      </div>
    </main>

    <noscript>
      <p class="noscript">This map story needs JavaScript to run.</p>
    </noscript>

    <script src="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.js"></script>
    <script src="./data/scenes.js"></script>
    <script src="./main.js"></script>
  </body>
</html>
