<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Messi & Ronaldo 3D Career Atlas</title>
    <meta
      name="description"
      content="MapLibre GL JS and OpenFreeMap powered 3D story map tracing Lionel Messi's life and career, with Cristiano Ronaldo as a contrasting route."
    >
    <link rel="preconnect" href="https://unpkg.com">
    <link rel="preconnect" href="https://tiles.openfreemap.org">
    <link href="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.css" rel="stylesheet">
    <link href="./style.css" rel="stylesheet">
  </head>
  <body>
    <main class="story-shell" aria-label="Messi and Ronaldo 3D story map">
      <div id="map" aria-hidden="true"></div>
      <div class="map-vignette" aria-hidden="true"></div>

      <header class="hero-label">
        <p class="eyebrow">3D Career Atlas</p>
        <h1>Lionel Messi: Routes of a Football Life</h1>
      </header>

      <aside class="scene-panel" aria-live="polite">
        <div class="panel-topline">
          <span id="scene-person" class="person-pill">Messi</span>
          <span id="scene-counter">01 / 18</span>
        </div>
        <p id="scene-year" class="scene-year">1987</p>
        <h2 id="scene-title">Rosario</h2>
        <p id="scene-place" class="scene-place">Rosario, Argentina</p>
        <p id="scene-description" class="scene-description">
          The route begins in the city where Lionel Messi was born.
        </p>
      </aside>

      <section class="control-strip" aria-label="Story controls">
        <button id="previous" type="button" aria-label="Previous scene">Previous</button>
        <button id="play-toggle" class="primary" type="button" aria-label="Pause autoplay">Pause</button>
        <button id="next" type="button" aria-label="Next scene">Next</button>
      </section>

      <div class="timeline" aria-hidden="true">
        <div id="timeline-progress" class="timeline-progress"></div>
      </div>

      <div class="legend" aria-label="Route legend">
        <span><i class="legend-line messi"></i>Messi</span>
        <span><i class="legend-line ronaldo"></i>Ronaldo</span>
      </div>
    </main>

    <noscript>
      <p class="noscript">This 3D map story needs JavaScript to run.</p>
    </noscript>

    <script src="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.js"></script>
    <script src="./data/scenes.js"></script>
    <script src="./main.js"></script>
  </body>
</html>
